<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Call Summary Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface-2: #f1f0ec;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --text-hint: #9b9b96;
      --accent: #1a1a18;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
    }
    .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 1rem;
    }
    .badge-pill span { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; display: inline-block; }
    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-hint);
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface-2);
      resize: vertical;
      min-height: 160px;
      line-height: 1.65;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--border-strong); background: var(--surface); }
    textarea::placeholder { color: var(--text-hint); }

    .examples-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      align-items: center;
    }
    .examples-label { font-size: 12px; color: var(--text-hint); }
    .ex-btn {
      font-size: 12px;
      padding: 4px 12px;
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .ex-btn:hover { background: var(--surface-2); color: var(--text); }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 13px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--text);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1.25rem 1.5rem;
      font-size: 14px;
      color: var(--text-muted);
    }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.3s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }

    /* Result card */
    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-top: 1.25rem;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
    }
    .result-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-title svg { width: 16px; height: 16px; color: #3B6D11; }

    .copy-btn {
      font-size: 12px;
      padding: 5px 12px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.12s;
    }
    .copy-btn:hover { background: var(--surface-2); }

    .fields { padding: 0.5rem 0; }
    .field-row {
      display: flex;
      gap: 16px;
      padding: 12px 1.5rem;
      border-bottom: 0.5px solid var(--border);
      align-items: flex-start;
    }
    .field-row:last-child { border-bottom: none; }
    .field-icon { width: 30px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding-top: 1px; }
    .field-icon svg { width: 15px; height: 15px; color: var(--text-hint); }
    .field-key {
      width: 110px;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding-top: 2px;
      letter-spacing: 0.01em;
    }
    .field-val {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }
    .badge-hot  { background: #EAF3DE; color: #3B6D11; }
    .badge-warm { background: #FAEEDA; color: #854F0B; }
    .badge-cold { background: #E6F1FB; color: #185FA5; }
    .badge-high { background: #EAF3DE; color: #3B6D11; }
    .badge-medium { background: #FAEEDA; color: #854F0B; }
    .badge-low  { background: #FCEBEB; color: #A32D2D; }

    /* Error */
    .error-box {
      padding: 1rem 1.5rem;
      background: #FCEBEB;
      border-radius: var(--radius-md);
      font-size: 14px;
      color: #A32D2D;
      margin-top: 1rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 12px;
      color: var(--text-hint);
    }

    @media (max-width: 520px) {
      h1 { font-size: 22px; }
      .field-key { width: 80px; }
      .card { padding: 1.25rem; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="badge-pill"><span></span> GenAI Prototype &nbsp;·&nbsp; Prototype #7</div>
    <h1>AI Call Summary Generator</h1>
    <p class="subtitle">Paste telecaller notes or a call transcript. AI extracts the client need, interest level, objections, and next action — ready to log into your CRM.</p>
  </div>

  <!-- Input card -->
  <div class="card">
    <div class="section-label">Call notes / transcript</div>
    <textarea id="callnotes" placeholder="e.g. Called Ravi from TechSoft, he runs a 50-person IT firm. Looking for a company website + CRM integration. Budget around 80k, wants it live in 2 months. Concerned about post-delivery support. Said he's also talking to 2 other vendors. Will send RFQ by Friday. Follow up next Tuesday..."></textarea>
    <div class="examples-row">
      <span class="examples-label">Try an example:</span>
      <button class="ex-btn" onclick="loadExample(0)">E-commerce lead</button>
      <button class="ex-btn" onclick="loadExample(1)">Cold call</button>
      <button class="ex-btn" onclick="loadExample(2)">Support issue</button>
    </div>
  </div>

  <button class="btn-primary" id="submitBtn" onclick="generateSummary()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    Generate summary
  </button>

  <div id="output"></div>

  <div class="footer">Built with Claude API &nbsp;·&nbsp; GenAI Prototypes 2025</div>

</div>

<script>
  const EXAMPLES = [
    `Called Priya from StyleMart, she's launching an online clothing store. Needs a full e-commerce website with payment gateway (Razorpay), product catalog, and order tracking. Budget is around 1.5 lakh, wants to go live before Diwali (2 months). Main concern is mobile responsiveness and WhatsApp order notifications. She's seen our portfolio and liked the UI. Asked for a detailed quote. Will share product list by WhatsApp. Decision maker is Priya herself. Follow up on Thursday with quote.`,
    `Cold call to Sanjay at BuildPro Constructions. He was polite but busy. Mentioned they have a very old website and know it needs updating. No immediate budget allocated yet. Not looking to decide for 3-4 months. Said to call back in January. No specific requirement discussed. Low priority lead for now.`,
    `Support call from Ananya, existing client. Website contact form is not sending emails since yesterday. She's getting customer complaints. Very frustrated. We identified it's an SMTP config issue after the server migration last week. Escalated to Karthik (backend). ETA 4 hours. Ananya needs to be updated by EOD. Also mentioned she wants to discuss adding a live chat widget next month. Log ticket #4421.`
  ];

  function loadExample(i) {
    document.getElementById('callnotes').value = EXAMPLES[i];
    document.getElementById('callnotes').focus();
  }

  async function generateSummary() {
    const notes = document.getElementById('callnotes').value.trim();
    if (!notes) { alert('Please paste call notes or a transcript first.'); return; }

    const btn = document.getElementById('submitBtn');
    const out = document.getElementById('output');
    btn.disabled = true;

    out.innerHTML = `
      <div class="result-card">
        <div class="loading-wrap">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          Analysing call...
        </div>
      </div>`;

    const prompt = `You are a CRM assistant for a digital services company. Analyse the following sales or support call notes and return a JSON object ONLY — no markdown, no explanation, no code fences.

The JSON must have exactly these keys:
- "client_name": string — full name and company if mentioned, else "Unknown"
- "requirement": string — 1-2 sentence summary of what the client needs
- "interest_level": one of "Hot", "Warm", "Cold"
- "budget": string — mention amount if stated, else "Not mentioned"
- "timeline": string — deadline or expected timeline if stated, else "Not mentioned"
- "objection": string — main concern, hesitation, or blocker raised; else "None raised"
- "next_action": string — clear, specific next step the sales/support team should take
- "priority": one of "High", "Medium", "Low"

Call notes:
${notes}`;

    try {
      const apiKey = document.getElementById('apiKeyInput') ? document.getElementById('apiKeyInput').value.trim() : '';
      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) headers['x-api-key'] = apiKey;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const raw = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(raw);
      renderResult(parsed);
    } catch (e) {
      out.innerHTML = `<div class="error-box">⚠ ${e.message || 'Something went wrong. Please try again.'}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  const ICONS = {
    client:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,
    req:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    interest:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2C9 7 4 9 4 14a8 8 0 0 0 16 0c0-5-5-7-8-12z"/></svg>`,
    budget:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v2m0 8v2m-4-6h8"/></svg>`,
    timeline:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    objection: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    action:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
    priority:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
  };

  function renderResult(d) {
    const iClass = { Hot: 'badge-hot', Warm: 'badge-warm', Cold: 'badge-cold' }[d.interest_level] || 'badge-warm';
    const pClass = { High: 'badge-high', Medium: 'badge-medium', Low: 'badge-low' }[d.priority] || 'badge-medium';

    const fields = [
      { icon: ICONS.client,    key: 'Client',       val: d.client_name },
      { icon: ICONS.req,       key: 'Requirement',  val: d.requirement },
      { icon: ICONS.interest,  key: 'Interest',     val: `<span class="badge ${iClass}">${d.interest_level}</span>` },
      { icon: ICONS.budget,    key: 'Budget',       val: d.budget },
      { icon: ICONS.timeline,  key: 'Timeline',     val: d.timeline },
      { icon: ICONS.objection, key: 'Objection',    val: d.objection },
      { icon: ICONS.action,    key: 'Next action',  val: d.next_action },
      { icon: ICONS.priority,  key: 'Priority',     val: `<span class="badge ${pClass}">${d.priority}</span>` },
    ];

    const rows = fields.map(f => `
      <div class="field-row">
        <div class="field-icon">${f.icon}</div>
        <div class="field-key">${f.key}</div>
        <div class="field-val">${f.val}</div>
      </div>`).join('');

    const copyText = fields.map(f => `${f.key}: ${f.val.replace(/<[^>]*>/g, '')}`).join('\n');

    document.getElementById('output').innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
            Call summary
          </div>
          <button class="copy-btn" id="copyBtn" onclick="copyText(\`${copyText.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
        <div class="fields">${rows}</div>
      </div>`;
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      if (btn) {
        btn.textContent = '✓ Copied';
        setTimeout(() => {
          btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
        }, 2000);
      }
    });
  }
</script>

</body>
</html>
